<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="icon" href="{{ "/assets/favicon.svg" | relative_url }}" type="image/svg+xml">
  {% feed_meta %}
  {% seo %}
  <script>
    try {
      if (localStorage.getItem("corymcodes-theme") === "light") {
        document.documentElement.classList.remove("dark")
      } else {
        document.documentElement.classList.add("dark")
      }
    } catch (_) {}
  </script>
  <link rel="stylesheet" href="{{ "/assets/css/app.css" | relative_url }}">
  <script type="importmap">
    {
      "imports": {
        "@hotwired/turbo": "https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.13/+esm",
        "@hotwired/stimulus": "https://cdn.jsdelivr.net/npm/@hotwired/stimulus@3.2.2/+esm"
      }
    }
  </script>
  <script type="module">
    import "@hotwired/turbo"
    import { Application, Controller } from "@hotwired/stimulus"

    window.Stimulus = Application.start()

    class NavController extends Controller {
      static targets = ["menu"]

      toggle() {
        this.menuTarget.classList.toggle("hidden")
      }
    }

    class ThemeController extends Controller {
      connect() {
        const stored = localStorage.getItem("corymcodes-theme")
        if (stored === "light") document.documentElement.classList.remove("dark")
        else document.documentElement.classList.add("dark")
      }

      toggle() {
        document.documentElement.classList.toggle("dark")
        localStorage.setItem("corymcodes-theme", document.documentElement.classList.contains("dark") ? "dark" : "light")
      }
    }

    Stimulus.register("nav", NavController)
    Stimulus.register("theme", ThemeController)
  </script>
</head>
<body data-controller="theme" class="dark:bg-ink">
  <div class="min-h-screen bg-[radial-gradient(circle_at_top_right,var(--hero-glow),transparent_34rem)]">
    <header class="sticky top-0 z-50 border-b border-line/60 bg-ink/85 backdrop-blur" data-controller="nav">
      <div class="shell flex h-20 items-center justify-between">
        <a href="/" class="flex items-center gap-3 text-textPrimary" aria-label="CoryMCodes home">
          <span class="flex h-9 w-9 items-center justify-center rounded-lg border border-accent/50 bg-accent/10 text-accentHover">
            <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="m8 8-4 4 4 4"></path>
              <path d="m16 8 4 4-4 4"></path>
              <path d="m14 4-4 16"></path>
            </svg>
          </span>
          <span class="text-lg font-semibold tracking-tight">CoryMCodes</span>
        </a>

        <nav class="hidden items-center gap-7 md:flex">
          <a class="nav-link {% if page.nav == 'home' %}nav-link-active{% endif %}" href="/">Home</a>
          <a class="nav-link {% if page.nav == 'devlog' %}nav-link-active{% endif %}" href="/devlog/">Devlog</a>
          <a class="nav-link {% if page.nav == 'projects' %}nav-link-active{% endif %}" href="/projects/">Projects</a>
          <a class="nav-link {% if page.nav == 'about' %}nav-link-active{% endif %}" href="/about/">About</a>
          <a class="nav-link {% if page.nav == 'resume' %}nav-link-active{% endif %}" href="/resume/">Resume</a>
          <a class="nav-link" href="https://github.com/corymcodes">GitHub</a>
          <button type="button" class="rounded-md border border-transparent p-2 text-textSecondary transition hover:border-line hover:text-textPrimary" data-action="theme#toggle" aria-label="Toggle color theme">
            <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 3a6 6 0 0 0 9 7 9 9 0 1 1-9-7Z"></path>
            </svg>
          </button>
        </nav>

        <button type="button" class="rounded-md border border-line p-2 text-textSecondary md:hidden" data-action="nav#toggle" aria-label="Toggle navigation">
          <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
            <path d="M4 7h16"></path>
            <path d="M4 12h16"></path>
            <path d="M4 17h16"></path>
          </svg>
        </button>
      </div>
      <nav class="shell hidden border-t border-line/60 pb-5 md:hidden" data-nav-target="menu">
        <div class="grid gap-2 pt-4">
          <a class="nav-link {% if page.nav == 'home' %}nav-link-active{% endif %}" href="/">Home</a>
          <a class="nav-link {% if page.nav == 'devlog' %}nav-link-active{% endif %}" href="/devlog/">Devlog</a>
          <a class="nav-link {% if page.nav == 'projects' %}nav-link-active{% endif %}" href="/projects/">Projects</a>
          <a class="nav-link {% if page.nav == 'about' %}nav-link-active{% endif %}" href="/about/">About</a>
          <a class="nav-link {% if page.nav == 'resume' %}nav-link-active{% endif %}" href="/resume/">Resume</a>
          <a class="nav-link" href="https://github.com/corymcodes">GitHub</a>
        </div>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="border-t border-line/60 py-10">
      <div class="shell flex flex-col gap-4 text-sm text-textSecondary md:flex-row md:items-center md:justify-between">
        <p>CoryMCodes: product engineering, Rails applications, workflow automation, and practical AI-assisted tooling.</p>
        <p><a class="text-accentHover hover:text-textPrimary" href="https://github.com/corymcodes/corymusick.github.io">Source</a></p>
      </div>
    </footer>
  </div>
</body>
</html>
