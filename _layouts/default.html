<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  {% feed_meta %}
  {% seo %}
  <style>
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
    h1, h2, h3 { line-height: 1.2; }
    pre { background: #f4f4f4; padding: 1rem; overflow-x: auto; }
    code { background: #f4f4f4; padding: 0.2em 0.4em; }
    pre code { background: none; padding: 0; }
    a { color: #0066cc; }
    .post-meta { color: #666; font-size: 0.9em; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/" style="text-decoration: none; color: inherit;">{{ site.title }}</a></h1>
    <p>{{ site.description }}</p>
    <p><a href="/feed.xml">RSS</a> · <a href="https://github.com/trevorturk/trevorturk.github.io">GitHub</a></p>
  </header>
  <main>{{ content }}</main>
</body>
</html>
