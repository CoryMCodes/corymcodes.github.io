title: CoryMCodes
description: Product engineering portfolio and devlog focused on Rails, workflow automation, and practical AI-assisted tooling.
url: https://corymusick.github.io
author: Cory Musick
repository: corymcodes/corymusick.github.io

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Permalinks without dates (e.g., /heroku-capacity/ not /2026/02/27/heroku-capacity/)
permalink: /:title/

# Feed settings
feed:
  path: feed.xml

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .playwright-mcp
  - _tailwind
  - node_modules
  - package.json
  - package-lock.json
  - vite.config.js
  - src
  - tailwind.config.js
